<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Email — IdentArk</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Plausible Analytics (privacy-friendly, GDPR compliant) -->
  <script defer data-domain="identark.io" src="https://plausible.io/js/script.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface-2: #161616;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --fg: #f5f5f5;
      --fg-2: #a0a0a0;
      --fg-3: #555;
      --green: #00e5a0;
      --green-dim: rgba(0,229,160,0.12);
      --green-glow: rgba(0,229,160,0.25);
      --mono: 'Geist Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    header {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 17px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--green);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .verify-container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .verify-icon {
      width: 80px;
      height: 80px;
      background: var(--green-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .verify-icon svg {
      color: var(--green);
    }

    .verify-container h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .verify-container p {
      font-size: 15px;
      color: var(--fg-2);
      margin-bottom: 32px;
    }

    .email-highlight {
      color: var(--fg);
      font-weight: 600;
    }

    .verify-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .code-input-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .code-input {
      width: 52px;
      height: 64px;
      background: var(--bg);
      border: 2px solid var(--border-bright);
      border-radius: 12px;
      color: var(--fg);
      font-size: 24px;
      font-weight: 700;
      font-family: var(--mono);
      text-align: center;
      transition: all 0.15s;
    }

    .code-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-dim);
    }

    .code-input.filled {
      border-color: var(--green);
      background: var(--green-dim);
    }

    .verify-btn {
      width: 100%;
      padding: 14px 20px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .verify-btn:hover {
      background: #00ffb3;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--green-glow);
    }

    .verify-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .resend-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .resend-text {
      font-size: 14px;
      color: var(--fg-2);
      margin-bottom: 12px;
    }

    .resend-btn {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--fg);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Geist', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .resend-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .resend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .countdown {
      font-size: 13px;
      color: var(--fg-3);
      margin-top: 8px;
    }

    .help-text {
      font-size: 13px;
      color: var(--fg-3);
    }

    .help-text a {
      color: var(--green);
    }

    .success-state {
      display: none;
    }

    .success-state .verify-icon {
      background: var(--green);
    }

    .success-state .verify-icon svg {
      color: #000;
    }

    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--fg-3);
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      IdentArk
    </a>
  </header>

  <main>
    <div class="verify-container">
      <!-- Pending State -->
      <div class="pending-state" id="pending-state">
        <div class="verify-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>

        <h1>Check your email</h1>
        <p>We sent a verification code to<br><span class="email-highlight" id="user-email">you@company.com</span></p>

        <div class="verify-card">
          <form id="verify-form">
            <div class="code-input-group">
              <input type="text" class="code-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
              <input type="text" class="code-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]">
              <input type="text" class="code-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]">
              <input type="text" class="code-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]">
              <input type="text" class="code-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]">
              <input type="text" class="code-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]">
            </div>

            <button type="submit" class="verify-btn" id="verify-btn" disabled>Verify email</button>
          </form>

          <div class="resend-section">
            <p class="resend-text">Didn't receive the code?</p>
            <button type="button" class="resend-btn" id="resend-btn">Resend code</button>
            <p class="countdown" id="countdown" style="display: none;">Resend available in <span id="countdown-time">60</span>s</p>
          </div>
        </div>

        <p class="help-text">
          Wrong email? <a href="/signup.html">Go back</a> and try again.
        </p>
      </div>

      <!-- Success State -->
      <div class="success-state" id="success-state">
        <div class="verify-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <h1>Email verified!</h1>
        <p>Your account is ready. Redirecting you to the dashboard...</p>
      </div>
    </div>
  </main>

  <footer>
    <span>&copy; 2026 IdentArk</span>
  </footer>

  <script>
    // Get email from URL params or session
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || 'you@company.com';
    document.getElementById('user-email').textContent = email;

    // Code input handling
    const inputs = document.querySelectorAll('.code-input');
    const verifyBtn = document.getElementById('verify-btn');
    const verifyForm = document.getElementById('verify-form');
    const resendBtn = document.getElementById('resend-btn');
    const countdown = document.getElementById('countdown');
    const countdownTime = document.getElementById('countdown-time');

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;

        // Only allow numbers
        if (!/^\d*$/.test(value)) {
          e.target.value = '';
          return;
        }

        if (value) {
          input.classList.add('filled');
          // Move to next input
          if (index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        } else {
          input.classList.remove('filled');
        }

        // Check if all inputs are filled
        const code = Array.from(inputs).map(i => i.value).join('');
        verifyBtn.disabled = code.length !== 6;
      });

      input.addEventListener('keydown', (e) => {
        // Handle backspace
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });

      // Handle paste
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);

        pastedData.split('').forEach((char, i) => {
          if (inputs[i]) {
            inputs[i].value = char;
            inputs[i].classList.add('filled');
          }
        });

        const lastFilledIndex = Math.min(pastedData.length, inputs.length) - 1;
        if (lastFilledIndex >= 0) {
          inputs[lastFilledIndex].focus();
        }

        verifyBtn.disabled = pastedData.length !== 6;
      });
    });

    // Focus first input on load
    inputs[0].focus();

    // Handle form submission
    verifyForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const code = Array.from(inputs).map(i => i.value).join('');
      const originalText = verifyBtn.textContent;

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';

      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Show success state
        document.getElementById('pending-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';

        // Redirect after 2 seconds
        setTimeout(() => {
          window.location.href = '/dashboard/index.html?welcome=true';
        }, 2000);

      } catch (error) {
        verifyBtn.disabled = false;
        verifyBtn.textContent = originalText;
        // Show error
        inputs.forEach(input => {
          input.style.borderColor = '#ff4d4d';
          input.value = '';
          input.classList.remove('filled');
        });
        inputs[0].focus();
      }
    });

    // Resend code
    let resendTimeout;

    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending...';

      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 1000));

        resendBtn.textContent = 'Code sent!';
        countdown.style.display = 'block';

        // Start countdown
        let seconds = 60;
        countdownTime.textContent = seconds;

        resendTimeout = setInterval(() => {
          seconds--;
          countdownTime.textContent = seconds;

          if (seconds <= 0) {
            clearInterval(resendTimeout);
            countdown.style.display = 'none';
            resendBtn.disabled = false;
            resendBtn.textContent = 'Resend code';
          }
        }, 1000);

      } catch (error) {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      }
    });
  </script>

</body>
</html>
