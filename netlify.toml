# Netlify configuration for IdentArk Landing + Dashboard

[build]
  publish = "dist"
  command = "npm run build"

# Pretty URLs (remove .html)
[[redirects]]
  from = "/app"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/docs"
  to = "https://github.com/identark/sdk#readme"
  status = 301

# API proxy to backend
[[redirects]]
  from = "/api/*"
  to = "https://api.identark.io/v1/:splat"
  status = 200
  force = true

# React SPA (Vite output) — real files under /dashboard/*, /demo.html, etc. are served first
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"
